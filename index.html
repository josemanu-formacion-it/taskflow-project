<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>TaskFlow de José Manuel</title>
  </head>

  <body>

    <header>
      <h1>TaskFlow de José Manuel</h1>
    </header>

    <aside>
      <p>Sidebar</p>
    </aside>

    <main>
      <section class="lista-tareas">

        <div class="tarea">
          <h3 class="titulo">Comprar material</h3>
          <span class="categoria">Trabajo</span>
          <span class="badge prioridad-alta">Alta</span>
        </div>

        <div class="tarea">
          <h3 class="titulo">Estudiar ASIR</h3>
          <span class="categoria">Estudios</span>
          <span class="badge prioridad-media">Media</span>
        </div>

        <div class="tarea">
          <h3 class="titulo">Hacer ejercicio</h3>
          <span class="categoria">Personal</span>
          <span class="badge prioridad-baja">Baja</span>
        </div>

      </section>
    </main>

  </body>
</html>
