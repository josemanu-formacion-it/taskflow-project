<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - Gestor de Tareas</title>
  <link rel="stylesheet" href="output.css" />
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">

  <!-- HEADER -->
  <header class="p-4 shadow bg-white dark:bg-gray-800 flex justify-between items-center">
    <h1 class="text-3xl font-bold">TaskFlow</h1>

    <button id="themeToggle" aria-label="Cambiar tema claro/oscuro"
      class="p-2 rounded bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600">
      🌙
    </button>
  </header>

  <main class="container mx-auto p-4 flex flex-col lg:flex-row gap-6">

    <!-- ASIDE: ESTADÍSTICAS -->
    <aside class="lg:w-1/4 bg-white dark:bg-gray-800 p-4 rounded shadow h-fit">
      <h2 class="text-xl font-semibold mb-4">Estadísticas</h2>

      <ul class="space-y-2">
        <li>Total tareas: <span id="statTotal" class="font-bold">0</span></li>
        <li>Completadas: <span id="statCompleted" class="font-bold">0</span></li>
        <li>Pendientes: <span id="statPending" class="font-bold">0</span></li>
      </ul>

      <div class="mt-4 flex flex-col gap-2">
        <button id="completeAllBtn" class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
          Marcar todas como completadas
        </button>

        <button id="clearCompletedBtn" class="bg-red-600 text-white p-2 rounded hover:bg-red-700">
          Borrar tareas completadas
        </button>
      </div>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <section class="flex-1">

      <!-- FORMULARIO -->
      <form id="taskForm" class="bg-white dark:bg-gray-800 p-4 rounded shadow mb-6">
        <h2 class="text-xl font-semibold mb-4">Añadir nueva tarea</h2>

        <label for="taskTitle" class="block mb-1">Título</label>
        <input id="taskTitle" type="text" required
          class="w-full p-2 mb-4 rounded bg-gray-100 dark:bg-gray-700" />

        <label for="taskDescription" class="block mb-1">Descripción</label>
        <textarea id="taskDescription" rows="3"
          class="w-full p-2 mb-4 rounded bg-gray-100 dark:bg-gray-700"></textarea>

        <button type="submit" class="bg-green-600 text-white p-2 rounded hover:bg-green-700">
          Añadir tarea
        </button>
      </form>

      <!-- FILTROS -->
      <div class="flex gap-2 mb-4">
        <button data-filter="all" class="filter-btn bg-gray-300 dark:bg-gray-700 p-2 rounded">Todas</button>
        <button data-filter="pending" class="filter-btn bg-gray-300 dark:bg-gray-700 p-2 rounded">Pendientes</button>
        <button data-filter="completed" class="filter-btn bg-gray-300 dark:bg-gray-700 p-2 rounded">Completadas</button>
      </div>

      <!-- BUSCADOR -->
      <input id="searchInput" type="text" placeholder="Buscar tareas..."
        class="w-full p-2 mb-4 rounded bg-gray-100 dark:bg-gray-700" />

      <!-- LISTA DE TAREAS -->
      <section id="taskList" class="space-y-3"></section>

    </section>
  </main>

  <!-- TEMPLATE DE TAREA -->
  <template id="taskTemplate">
    <article class="task-item bg-white dark:bg-gray-800 p-4 rounded shadow flex justify-between items-start">
      <div class="flex items-start gap-3">
        <input type="checkbox" class="task-check mt-1" />
        <div>
          <h3 class="task-title font-semibold"></h3>
          <p class="task-desc text-sm opacity-80"></p>
        </div>
      </div>

      <div class="flex gap-2">
        <button class="edit-btn text-blue-600 hover:underline" aria-label="Editar tarea">Editar</button>
        <button class="delete-btn text-red-600 hover:underline" aria-label="Eliminar tarea">Eliminar</button>
      </div>
    </article>
  </template>

  <!-- MODAL DE EDICIÓN -->
  <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center" role="dialog" aria-modal="true">
    <div class="bg-white dark:bg-gray-800 p-6 rounded shadow w-80">
      <h2 class="text-xl font-semibold mb-4">Editar tarea</h2>

      <label for="editTitle" class="block mb-1">Título</label>
      <input id="editTitle" type="text" class="w-full p-2 mb-4 rounded bg-gray-100 dark:bg-gray-700" />

      <label for="editDescription" class="block mb-1">Descripción</label>
      <textarea id="editDescription" rows="3" class="w-full p-2 mb-4 rounded bg-gray-100 dark:bg-gray-700"></textarea>

      <div class="flex justify-end gap-2">
        <button id="cancelEdit" class="p-2 bg-gray-300 dark:bg-gray-700 rounded">Cancelar</button>
        <button id="saveEdit" class="p-2 bg-blue-600 text-white rounded">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
