<!DOCTYPE html>
<html lang="es" class="dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Project</title>

  <link rel="stylesheet" href="output.css" />
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 dark:from-gray-900 dark:to-gray-800 min-h-screen transition-colors duration-300">

  <!-- Header -->
  <header class="bg-white/80 dark:bg-gray-800/80 backdrop-blur shadow-md sticky top-0 z-10 transition-colors duration-300">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-3xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight">TaskFlow</h1>

      <nav class="space-x-6 text-lg">
        <a href="#" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition">Inicio</a>
        <a href="#" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition">Tareas</a>
        <a href="#" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition">Perfil</a>
      </nav>

      <!-- Botón modo oscuro -->
      <button id="toggleDark"
        class="ml-4 px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 shadow hover:bg-gray-300 dark:hover:bg-gray-600 transition">
        🌙 / ☀️
      </button>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="max-w-5xl mx-auto px-6 py-10 space-y-10">

    <!-- Sección de bienvenida -->
    <section class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 transition">
      <h2 class="text-2xl font-bold mb-3">Bienvenido a TaskFlow</h2>
      <p class="text-gray-700 dark:text-gray-300 leading-relaxed">
        Gestiona tus tareas, organiza tu flujo de trabajo y mantén todo bajo control con una interfaz clara y moderna.
      </p>
    </section>

    <!-- Formulario para crear tareas -->
    <section class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 transition">
      <h3 class="text-xl font-semibold mb-6">Crear nueva tarea</h3>

      <form id="taskForm" class="space-y-5">
        <input
          type="text"
          id="taskTitle"
          placeholder="Título de la tarea"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-3 shadow-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
          required
        />

        <textarea
          id="taskDescription"
          placeholder="Descripción"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-3 shadow-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
        ></textarea>

        <button
          type="submit"
          class="bg-blue-600 dark:bg-blue-500 text-white px-6 py-3 rounded-lg shadow hover:bg-blue-700 dark:hover:bg-blue-600 transition font-medium"
        >
          Añadir tarea
        </button>
      </form>
    </section>

    <!-- Lista de tareas -->
    <section class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 transition">
      <h3 class="text-xl font-semibold mb-6">Tus tareas</h3>

      <ul id="taskList" class="space-y-4">
        <!-- Las tareas se insertarán aquí dinámicamente -->
      </ul>
    </section>

  </main>

  <!-- Footer -->
  <footer class="text-center text-gray-600 dark:text-gray-400 py-8">
    © 2026 TaskFlow Project — Todos los derechos reservados.
  </footer>

  <!-- Script principal -->
  <script type="module" src="src/app.js"></script>

  <!-- Script modo oscuro -->
  <script>
    const root = document.documentElement;
    const btn = document.getElementById("toggleDark");

    btn.addEventListener("click", () => {
      root.classList.toggle("dark");
      localStorage.setItem("theme", root.classList.contains("dark") ? "dark" : "light");
    });

    if (localStorage.getItem("theme") === "dark") {
      root.classList.add("dark");
    }
  </script>

</body>
</html>
