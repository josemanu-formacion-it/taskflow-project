<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Project</title>

  <link rel="stylesheet" href="output.css" />
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 text-gray-900 min-h-screen">

  <!-- Header -->
  <header class="bg-white/80 backdrop-blur shadow-md sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-3xl font-extrabold text-blue-600 tracking-tight">TaskFlow</h1>
      <nav class="space-x-6 text-lg">
        <a href="#" class="text-gray-700 hover:text-blue-600 transition">Inicio</a>
        <a href="#" class="text-gray-700 hover:text-blue-600 transition">Tareas</a>
        <a href="#" class="text-gray-700 hover:text-blue-600 transition">Perfil</a>
      </nav>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="max-w-5xl mx-auto px-6 py-10 space-y-10">

    <!-- Sección de bienvenida -->
    <section class="bg-white p-8 rounded-xl shadow-lg border border-gray-200">
      <h2 class="text-2xl font-bold mb-3">Bienvenido a TaskFlow</h2>
      <p class="text-gray-700 leading-relaxed">
        Gestiona tus tareas, organiza tu flujo de trabajo y mantén todo bajo control con una interfaz clara y moderna.
      </p>
    </section>

    <!-- Formulario para crear tareas -->
    <section class="bg-white p-8 rounded-xl shadow-lg border border-gray-200">
      <h3 class="text-xl font-semibold mb-6">Crear nueva tarea</h3>

      <form id="taskForm" class="space-y-5">
        <input
          type="text"
          id="taskTitle"
          placeholder="Título de la tarea"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
          required
        />

        <textarea
          id="taskDescription"
          placeholder="Descripción"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        ></textarea>

        <button
          type="submit"
          class="bg-blue-600 text-white px-6 py-3 rounded-lg shadow hover:bg-blue-700 transition font-medium"
        >
          Añadir tarea
        </button>
      </form>
    </section>

    <!-- Lista de tareas -->
    <section class="bg-white p-8 rounded-xl shadow-lg border border-gray-200">
      <h3 class="text-xl font-semibold mb-6">Tus tareas</h3>

      <ul id="taskList" class="space-y-4">
        <!-- Las tareas se insertarán aquí dinámicamente -->
      </ul>
    </section>

  </main>

  <!-- Footer -->
  <footer class="text-center text-gray-600 py-8">
    © 2026 TaskFlow Project — Todos los derechos reservados.
  </footer>

  <script type="module" src="src/app.js"></script>
</body>
</html>
